body:
  text: 魏國西寺沙門法藏述盧舍那佛品第二自下明正宗將釋此文四門分別一釋名二來意三宗趣四釋文初釋名中盧舍那者古來譯或云三業滿或云淨滿或云廣博嚴淨今更勘梵本具言毗盧遮那盧舍那者此翻名光明照毗者此云遍是謂光明遍照也此中光明有二種一智光二身光智光亦二義一照法謂真俗雙鑒二照機謂普應群品身光亦二種一是常光謂圓明無礙二放光謂以光警悟此中遍者亦二種一平漫遍無礙普周故二重重遍如帝網重現故此二圓融各全體遍非是分遍是故下文云佛身充滿諸法界普現一切衆生前如是等無量如文説此中身智無礙故身光即智光二遍無礙故平遍即重重光遍無礙故光明即遍照遍照性開覺是故名為佛此明下文世界海等諸事一一皆是稱性緣起無礙離暗覺照稱光無不普周法界名遍此舍那佛非局報身以通器等三種世間具十身故問如下文中略明五海廣辨世界何故不云世界品乃題佛名耶答古德釋云以從主為名故以主勝故舉土主以説之今釋以佛通三世間故下文土等即是舍那佛如十身中國土身等又以依正無礙故是故標釋互舉文綺耳又以五海中佛海即具餘四海餘亦爾以佛勝故獨標為軌故以為名餘不説也二來意者前既序已次顯正宗義次第故是故次來三宗趣者有二一約人二約法人亦二一化主二助化各有體相用主中內證法智為體七日思惟解脫為相加説為用此三不二唯是一果助化中入定為體蒙加為相起説為用此三不二唯是一因此上因果融攝不二唯是一人法中亦二一約義理二約教事亦各有體相用義理中性海為體別德為相應教為用此三不二唯一義理教事中本分內五海十智為體十世界及華藏界為相益機為用此三不二為一教事此上教義融攝不二為一法也又上人法復圓融不二為一宗趣此四義各三為一緣起相即無礙是故或唯果以俱是佛故或唯因俱是普賢故或教或義或人或法或體或用或主體乃至或教用並皆攝盡準思可見下諸會宗皆有此相但隨法異耳第四釋文中有二一通辨經論解釋分齊生解方便二別釋本文初中略有十種方便一解釋決擇二釋文方軌三四種悉檀四四意趣五四祕密六四道理七五力八六相九六釋十八聲第一解釋決擇者依雜集論第十五云釋決擇者謂能解釋諸經宗要開發彼義故案云彼中略開六種廣有十四具如彼説今略舉一門論云攝釋門者謂若於是處宣説諸經緣起所以句義次第意趣釋難案云緣起所以者顯教起所因也句義次第者品會文義相生次第也意趣者顯經宗趣也釋難者釋外妨難也餘如彼論恐煩不述第二釋文方軌者攝論第五云若有欲造大乘法釋略由三相應造其釋一由説緣起二由説從緣所生法相三由説語義無性釋云為欲開曉諸造釋者解釋道理故説略由三相等言世親釋云由此三相隨其所應應造一切大乘法釋案云初由廣説自性緣起為所依本即阿賴耶識與諸法互為緣起二依此所生轉識諸法於上分別三性道理謂於依他所執無圓成有得不得見不見同時等如論具釋此二門觀道理解釋三由説語義謂顯佛言下義意此有二種一德處謂顯佛果二十一種殊勝功德無性釋云已得在已圓滿饒益故名為德二義處謂顯菩薩三十二行相無性釋云未得在已隨順趣求故名為義此二所説皆以初句標餘句釋此是觀説者意解釋第三四悉檀者智論第一云有四悉檀總攝一切十二部經八萬四千法藏皆悉是實無有相違一世界悉檀者有法從因緣和合故有無別性譬如車轅軸輻輞等和合故有無別車人亦如是五衆和合故有無別人若無世界悉檀者佛是實語人云何言我以天眼見諸衆生隨善惡業死此生彼當知是人以世界悉檀故非第一義悉檀二者各各為人悉檀觀人心行而為説法於一法中或聽或不聽如為斷見人説雜業故雜生世間得雜觸得雜受如為常見人説無人得觸無人得受如是等三對治悉檀者對治則有實性則無如酸醎等於風病名藥餘病非藥不淨等於貪等亦爾準之四第一義悉檀者一切法性一切言論差別皆悉平等一味解云或約世界説有勝義為無如第一説或勝義為有世界為無如第四説或對異機説有對餘機説無如第二説或治此病為要於餘病為非如第三説皆須得其本意法悉有用隨言混取失意成謗第四四意趣者雜集論第十二云由此四意趣故方廣分中一切如來所有意趣應隨決了又莊嚴論第十三云諸佛説法不離四意攝論第五云以此決了一切諸佛言教一平等意趣謂如説言我昔曾於彼時彼分即名勝觀正等覺者無性釋云謂一切佛由資糧等互相似故説彼即我非昔毗婆尸佛即今釋迦楞伽中約四義釋一字等二語等三身等四法等故説即彼而實非彼二別時意趣謂如説言若誦多寶如來名者便於無上正等菩提已得決定又由唯發願便得往生極樂世界無性釋云謂勸懈怠不能於法精勤學者故作是言此意長養先時善根如世間説但由一錢而得於千莊嚴論釋此由別時得生故解云以後別時得彼千也三別義意趣者謂如説言若已逢事爾所殑伽沙等佛於大乘法方能解義無性釋意約證相大乘不就教相大乘故作是説莊嚴論云如佛説一切無有自性故無生故解云此約證無生説四補特伽羅意樂意趣謂如為一先讚布施後還毀呰尸羅及一分修當知亦爾無性釋云先為慳貪讚歎布施後為樂施毀訾布施餘戒修亦爾莊嚴論云由得少善便為足故讚毀也第五四祕密者雜集論云如是四種於大乘中略攝如來一切所説祕密道理梁攝論第六云如來所説不出四意四依依即密也無性攝論第五云四種意趣四種祕密一切佛言應隨決了一令入祕密為化怖斷有情依世俗道理於聲聞乘中説有化生等諸有情於大乘中説心常等此則於大小乘説有人法並是祕密莊嚴論云應知教諸聲聞入於法義令得不怖説色等是有故二相祕密謂於是處説諸法相顯三自性無性釋云為令悟入所知相故解云此雖説法相意顯三無性故為密也又莊嚴論云應知於分別等三種自性無體無起自性清淨説一切法故解云此雖説三性意顯三無性如次可知三對治祕密謂於是處説對治行八萬四千解云謂於無説有於同説異等皆是密意對治所化有情障故説此八萬四千等也四轉變祕密謂如頌曰覺不堅為堅善住於顛倒極煩惱所惱得最上菩提無性釋云剛強流散説名為堅非此堅故説名不堅即是調柔無散亂定即於此中起堅固慧覺彼為堅解云散心流動顯名不堅散心剛強就密名堅定心守境顯名為堅定心調柔密名不堅若取顯了於散亂起堅固慧則遠菩提今取祕密於定心起堅固慧則得菩提也無性云謂於四顛倒善能安住知是顛倒決定無動解云若取顯了則住於無常等計常等四倒之中豈得菩提今取祕密知此常等於無常等橫計而起決定知此名為善巧住於顛倒故能得菩提也又世親釋云是於能顛倒中善安住義於無常等謂常等名顛倒於無常等謂無常等是能顛倒此義則倒彼所計義名顛倒於此安住故得菩提言極煩惱所惱者無性釋云為所化有情精進劬勞所疲倦故解云若取顯了為貪瞋等惱亂行者名為煩惱此則遠菩提今取祕密精進勤苦劬勞行者亦名煩惱此則得菩提如頌處生死久惱但由於大悲梁魏攝論及世親莊嚴對法等論並準可知第六四種道理者雜集第十一因辨觀察契經等法應當解釋諸法道理道理有四一觀待道理二作用道理三證成道理四法爾道理案云觀待有二一俗諦緣起要相待生因此通染淨二真諦之理待了因顯此唯約淨二作用亦二一緣起諸法各有業用二真如法界依持等用三證成亦二一比量成立二現量成立四法爾亦二一諸緣起法有佛無佛性從緣起二真如法界性自平等第七五力者思益經第二若人能於如來所説文字語言章句通達隨順不違不逆和合為一隨其義理不隨章句言辭而善知言辭所應之相知如來以何語言説法以何隨宜説法以何方便説法以何法門説法以何大悲説法梵天若菩薩能知如來以是五力説法是菩薩能作佛事案云下經次第廣釋初言説者如來説三世法垢淨法世出世流無流等法是言説如幻人説無決定故乃至云説如虛空無生滅故當知是言説為無所説乃至云是名如來言説二隨宜者如來或垢法説淨不得垢法性故或淨法説垢貪著淨法故乃至云生死是涅槃無退無生故涅槃是生死以貪著故實語是虛妄以生語見故虛妄是實語為增上慢人故如來隨宜故或自説我是説常邊者乃至廣説三方便者如來實不得我人衆生壽者亦不得施亦不得慳等乃至方便為諸衆生讚説布施得大富等乃至廣説四法門者謂六根等諸法皆是解脫門以空無我所性自爾故乃至文字亦爾五大悲者佛以三十二種大悲謂一切諸法無我而衆生不信不解如來於此而起大悲乃至廣説案云此上五種初一約能説以不言之言而説故二約所説謂法隨迷悟辨是非故三約所為機以巧方便於無説有故四約法自體本來自空為解脫門故五約能説之心為愍物迷而起説故第八六相者十地論第一云一切所説十句皆有六種相門一總相二別相三同相四異相五成相六壞相具釋如下十地品中第九六釋者亦名六合釋一依主釋者亦名依士謂兩法相望假依彼主而立此名如説眼識非眼即識以依眼之識名為眼識若離言眼是能見義識是了別義今此合辨故名合釋若單法為名者非六釋所收也二持業釋者亦名同依釋謂舉其業用以顯自體如説藏識藏是業用識是其體藏即識故持用釋體非是別體相依既非二法何名合釋以體用不離故名合也三有財釋者亦名多財釋謂從所有物以立其名如説佛土土是佛之所有名為佛土也四相違釋者謂如一句中有多名言各別詮義如偈説於佛及法僧等非如依主持業等雖有多言同目一義也五鄰近釋者謂從所近以立其名如四念處觀實以慧為體以與念相近名為念處也六帶數釋者謂以數顯義如説十地等皆從數以顯義別也問此六釋攝法盡不答凡諸法得名略有五例一離合得名如此六釋二單法當體立名如信等此約直詮三無他受稱如無明等此約遮詮四譬類得名如華嚴等從喻彰名五相形立號如大乘形小以立其名等是故六釋但據初門若於前六帖後四釋總為十釋略攝諸法得名差別第十八聲者依西國法若欲尋讀內外典藉要解聲論八轉聲法若不明知必不能知文義分齊一補盧沙此是直指陳聲如人斫樹指説其人二補盧私是所作業聲如所作斫樹三補盧崽拏是能作具聲如由斧斫四補盧沙耶是所為聲如為人斫五補盧沙䫂是所因聲如因人造舍等六補盧殺娑是所屬聲如奴屬主七補盧鎩是所依聲如客依主瑜伽第二名上七種為七例句以是起解大例故聲論八轉更加𭛸補盧沙是呼召之聲然此八聲有其三種一男聲二女聲三非男非女聲此上且約男聲説之以梵語名丈夫為補盧沙故又此八聲復各三謂一聲二聲身三多聲身則為二十四聲如喚丈夫有二十四女及非男女聲亦名有二十四總有七十二種聲以目諸法可以準知然此方多無此例第二釋文者此品有二分初大衆疑請分二爾時世尊下如來現答分前中分二先明諸會請問後釋此文前中作四門一明有無者於八會中初二後二有餘會皆無何以爾者謂初會標果起因故問第二會初為尋因至果故問但為因位升沈寄於五會以答果位無差故當會答然五會中間諸品之內更有餘問者並是為顯當會所説法中差別隨説問答非是別問大位之相第七會中明因果純熟故有問謂行修無礙六位頓成故當會答也第八會中明稱性因果故有問謂俱入法界無差別故亦當會答也二所問法不同者初會第八唯果分有因但所信攝化為異第二第七唯因分有果但位行為異三能問人不同者初及第八各具同異二衆齊問以所問法衆同依故第二唯同生衆問以所入位同生勝故第七唯一人問以造修之行各別成故四請問儀式者有二一約言念二約通別初中泛論請有二一言請二念請答亦二一言説答二示相答此二問答如次及交絡成四句可知為成三慧有斯二例初二會及第八唯念請答通二謂佛示相答菩薩以言答以對佛興請不待言故明佛智領疑身相現答自在故也第七唯言請言答以行法約言明了顯故又對普賢興問還普賢答故也二通別者初會及八別問通答第二第七別問別答皆可知二釋文者此中有二初長行後重頌此二差別大例有十一約利鈍謂鈍根未悟更重為頌二約前後以後來未聞為之重頌三約生熟熟人直説便悟生類曲巧方知故重頌也四約文質或有愛質直示長行或有樂文示頌言美妙五約二持論云長行散説生正解故義持成就偈頌總攝易受持故文持成就六約資成謂更以偈頌資顯長行義明了故此上通諸文重頌七約成圓以頌中兼顯長行闕無成前所説義圓滿故此如發心功德品偈等八約體相以從門約相長行直説此約同教及三乘以就體圓融偈頌巧顯此約別教此如十行品偈等九約通別以長行別指的重頌通該攝如此品世界等頌文是也十約心言謂長行直顯心所念法偈頌宣示令請圓滿此唯此文也又有義凡佛説法法爾有二相謂直説契經必有祇夜重頌下諸品中重頌皆約此十例準之就此長行中有三初標能問人謂同生異生俱在法界故云咸也言説事彰非顯奇故念心入法顯深細故云念也二明所請法三唯願下結請所請中古説云此有二十三句分二初二十一句問果法後二句問因行前中準下答中五海此文為五初十二句問佛海次三句如名問三海後六句準下當是根欲性海但由根欲不同致能被之緣差異此中舉緣顯根下文舉根顯緣有斯左右今更釋此中有三十五句分二初三十句問果法後一切菩薩下五句問因行就前中分三初十句問佛內德盈滿德二從示現菩提下十句問佛外相顯著德三世界海下十句問化用普周德就初中初一句總餘九別於中何等是三字貫三十五句一切諸三字通前三十句果問應知何故此經最初問佛果法耶謂標幟故宗歸故為本故顯德故生信故指南故經首題佛華嚴者義存於此言佛地者佛地論第一云清淨法界及彼妙智受用和合一味事等是佛所依所行所攝故名佛地解云即以淨法界為所依妙智為所行餘功德等皆為所攝即以真理妙智無礙為體依大乘同性經佛有十地一切菩薩二乘所不能行何等為十一名甚深難知藏明智德地乃至第十毗盧遮那智海藏地如下十地章具釋二佛境界者下九皆是佛地中開出故是別句謂開清淨法界是佛所證之境或總舉所知通於真俗下性起品云一切衆生是如來境界乃至第十非境界境界是如來境界又亦是分齊境界故明難品中明十種佛境云如來深境界其量齊虛空等又釋通有所知及分齊境下不思議品中佛有十種不可譬喻不可思議境等應尋下三處文於此具辨三佛持有四義一以淨法界任持一切諸功德故二以大圓鏡智及相應淨識各能任持諸功德故三後得智中大陀羅尼門總持無量諸法海故四是十佛中持佛隨順故又下第十地佛力持等十持又離世間品中亦十持初佛持乃至第十智持此二文中皆以初句為總攝別入總俱名佛持又如下不思議品佛有十種出生住持智慧等並應具尋辨之四者準下頌文此中次佛無上智一句此則是下十智等可知五佛行者是大悲攝生之行又是大智造作之行此並不作之作無思成事性起品無障礙行如如行等是如來行此是異二乘功德六佛力者有二義一不為他所屈伏故二能摧壞魔怨故別説有十謂是處非處智力等又有十種如不思議品最勝力大力無量力乃至第十大力那羅延幢佛所住法等七佛無畏者所説不怯故名無畏是伏外道功德或四或十如離世間品説上來明大智德八佛三昧者謂師子奮迅等微塵數三昧海攝略為十如不思議品説此明大定功德九佛自在者依定發起無盡神通所作無礙故云自在不思議品佛有十種自在正法又離世間有十自在等並可知此明神通功德十佛勝法者殊勝功德超過餘德故云勝法亦有十種如不思品説此明大福功德上十句明內德盈滿竟第二外相顯著中初示現菩提者謂對機示現成大菩提如性起品成菩提處説又不思品亦説並應知此是總句下九是別以六根三業皆是成菩提相故下不思品及離世品此之九門一一各以十門辨説如彼應知佛光明是身業餘並可知上來明外相顯著竟第三化用普周十句中初世界海者是化用處也通染淨土即入十佛國土身攝略説十種如此品下文説二衆生海者是所化機也通麁妙空有等亦入十身攝又如離世間品十種入衆生等應知三法界方便海者此有四義一理性法界是前衆生及世界等所依之界二染事法界謂彼所化衆生蘊界法等三離垢法界謂佛所得最淨法等四淨用法界謂佛攝生所用善巧故云方便如不思品佛有十種法界無量無邊等應知四準下頌中此文闕調伏海調伏海即是所調伏是根欲性海攝但頌與長行文家互有存略故也五佛海者能化之佛非一如海謂遍一切處而轉法輪故六波羅蜜海者有二義一是佛所説行法以授群機故二是彼所化所行之行即化所成益謂十度等七法門海亦二一是佛所設之教法通彼遊入故二是彼所化行成證理所入之法此亦有十如不思品説八化身海者異機別感現相多端如云諸毛孔出化身雲等又盧舍那佛遍十方出一切化莊嚴身等又離世間品十種變化等九佛名號海者對根宜聞名號非一如名號品一一世界有百億萬等十佛壽量海者應機修短虧盈萬差略有十位如壽命品説上來果問竟第二因問中五句初一句總下四句別一明十住初發心住等二即十行中十度行也三願者即十回向大願也四智慧藏者即十地中以智為性含攝蘊積故如下地品菩薩同名藏等是也第三結請中唯願慈悲者明佛有説因不疲倦故方便者顯佛巧説令易解故由悲發心由巧得解二頌中為顯奇故不以常口説表依正無礙故供具中説即是下剎説耳九頌分二初三歎德請後六舉法請前中初二歎佛請明具説因故後一歎衆請明具説緣故前中初一顯佛自德圓初半辨因盡過去現果無功後半用窮來際無思普應雲者灑法雨故潤機緣故自無本故後一明外化備謂初半令滅惡生善後半令離苦得樂又初令得涅槃後令得菩提二無量下明歎衆請中一心者心無異念故合掌者身無慢怠故觀最勝者住念向佛故下半總舉所念願佛開闡第二舉法請中分三初三頌舉前初十句於中初一頌內有六句一地二境三持四智五力六無畏下句結請次一頌中有三句一定二行三自在即神力是也下句請説後一頌頌勝法亦是示現菩提等可知第二一頌頌第二十句以三業不離六根故同頌也第三二頌頌第三十句初頌內有五海後頌中有二海餘三海及因問總攝故云無量無邊等下句結請第二答相中古來諸德亦有將此諸問配下諸會中答之此判恐謬以第二會等自別有問別有答故四番問答不交雜故是故總於此品並通答也以下説分具果因二説故就此文中長分有十一面光集衆分二毫光示法分三法主入定分四諸佛加持分五大衆同請分六定中略説分七起定成益分八毛光讚德分九許説令喜分十正陳法海分初中二先放光後集衆前中亦二先身光遍覺二光語呼召此二亦即答上佛光明音聲問初中亦二先此光照彼二諸菩薩下尋光見此前中有五初知念者領疑也以將欲答故即放光所因也二明光出處面門者諸德有三釋一云是口一云是面之正容非別口也光統師云鼻下口上中間是也準下施鼻文亦如所説今釋依梵語稱面及口并門悉名目佉是故翻此目佉為面門也故知此中通舉其事口者為表教道遐被也面者正對向機也門者開法攝生也齒者勝用也謂思咀法味故治碎惑障故以緣起具德相差別故云一一各放塵數光也三別顯所出有十門通論一一皆通三世間等別明初六佛海次二器海次一衆生海後一法界方便海又前八意業記説輪次一身業神通輪後一語業正教輪四攝眷屬五所照處此中放光有四意一現相表實二驚起信心三照觸救苦四為集衆遠召是故彼衆依光覩此知所集處頌中九偈半有四義初六頌半通舉佛德以勸往次一別明能説以勸詣次一別標所説以勸觀後一通結佛德顯深廣此四皆以後釋前思之可見初中二先舉德後人尊下勸往前中三初二身業一體一用次二意業一用一體後一語業勸中初半勸為法次半勸多衆次半教興供雖圓音頓説九世願海然不壞本法故非一念也即標下所説法門也餘文可知第二集衆中先明諸會有四義一有無二來處遠近三本處名等不同四偈歎及前後初中六七二會無以證位及行熟俱皆離相故餘六皆有所為可知凡集新衆有四意一為攝機二為證法三為興供四明衆圓第二遠近者初二十剎塵三百四千五萬以寄位漸增故八過不可説者顯證法深故第三者一處二佛三菩薩四供多少並隨會應知第四者初二會無偈讚以起修始故餘四皆有以顯法位增故又前五定前集以從修入證故第八定後集以依證起用故二釋文中有二長行偈頌初中亦二先衆集二顯德初中亦二先集後結初中十方即為十段一一方皆有七一器海名二剎名十二佛國土等此二是所依法相但通別為異三佛名四菩薩此二是能入智但滿分為異五主伴俱來明具德圓滿六興供供佛順益義謂因順果也七依本方坐明攝散歸靜何故先辨東方謂顯開明之始故順彼方故以西域方儀以東為上故其堂殿皆面向東如祇洹寺菩提寺皆面向東如來説法亦多分面向東故面門光出正即向東問下文此華藏界無邊云何此中有東等耶答以華藏界是邊無邊不二故名無邊如下説無邊邊不二故名有邊如此説是則不壞邊而恆無邊不破無邊而恆邊若謂無邊乖於邊邊乖無邊是情計所及法非正緣起也以此邊無邊是一事故雙超情計也其猶錦窠白線徹編而不雜紫窠紫等亦爾又白窠有紫由是綿故若白中無紫紫線不至兩編即繡非綿也白窠無紫由是綿故若白有紫現則壞文非綿也是故由白有紫得成白無紫無白亦爾當知此中道理亦爾思以準之問若爾彼十方世界是華藏不答是不謂由即是故不是不是亦爾準上思之又何以故由是華藏東等故即不即也問此十世界外更有餘界不答無也何以故以華藏為主彼十為伴此主及伴圓融普遍一切塵道重重如帝網故餘皆即此如虛空故又此中諸供並是法門隨相有十一妙寶是可貴義二須彌勝高義雲是潤益義含雨義齗齶義三日是除暗義輪是具德義四閣是重成義如正智上起悲等五華是淨義開敷義六香雲是戒等芬芳義七座是攝益義八蓋是蔭覆義九幢是獨出義十樹是建立義餘並準之又約法亦有十例一或以色法為雲如寶妙色雲等二以大聲為雲如妙音及歎佛德等此約事三以無盡佛土為雲如十種不思議佛剎雲等此約依報四以九世理性為雲如三世佛法身光明雲等此約體五以佛八相等為雲如十種佛變化雲等此約用六以無礙解脫法門為雲如十種解脫蓋雲等此約不思議解脫也七以佛所證境為雲如十種佛境界雲等此約果八以一切菩薩行為雲如十種菩薩所行示現雲等此約因九以一切衆生欲樂為雲如十種一切衆生樂不可盡示現雲等此約法器十以現佛大願為雲如十種一切諸佛所願示現雲此約赴機此等一一皆以十門説者為顯無盡故也此上十義皆一一中有一切法緣起無礙是故或人或法或理或事或境或行或依或正或因或果此中一一供具皆云滿虛空者明稱本性空集而不雜如緣起性也是故真理妙行可即事而成雲華寶等事可即理而為法此約別教思之第二結中一結土二主三伴四供五座第二現德用次第座者緣起無礙集而不雜也於中二先明德體無礙後念念下妙用勝益前中通用中初句總有六重無礙並倍倍多前一身光無礙二光人無礙三人法無礙四塵剎無礙五依正無礙六化用無礙如一念中於一世界化一佛剎塵數衆生即此念中於一切世界亦如是化一念既爾餘一切念悉皆然也如一剎中現此盡念三世諸佛餘一切剎各別所現亦如是也如一塵中有此一切現佛之剎餘一切塵各別亦爾如一菩薩法門遍此一切現剎塵道餘一切菩薩法別遍亦爾如一光出此一切遍塵菩薩餘一切光別出亦爾如一毛孔放此一切出菩薩光餘一切毛別出亦爾上來總辨一菩薩身中事如一菩薩一切亦爾如主伴亦然是則重重無盡非心言能及此是一乘法界法爾緣起實德非變化也此等並是普賢位德菩薩既爾佛果德用非此能比可準思通二用益中三初標所化衆二以夢下明能化法三於一念下辨化益能化中十句初九別辨後一總結九中一夢自在者即實即空故一念現多法故二淨故化故三教義故四顯勝神通令歸依故怖令入法故動相歸真故五願力攝生故六深音性離故染音淨用故顯淨音普收故七圓音普降故如法界頭口等八體用驚機故九建圓因故三蒙益中有六故釋有四重以文含多勢故一令離重苦二堪成出世器三令得二乘解脫果向十位此大乘中二乘非愚法也又小乘中五停心觀前在邪定依成實𤏙頂已上悉名正定永不退故依毗曇忍心已上方得不退若依地論見道已上方名正定故彼云正位正定者見道已上方是正位言不定者此二中間名不定也四入大乘三賢位五證十地六成佛果此約同教又初三同前四入初教五入終教六入頓教此約病盡處説三又初人天次二小乘四是漸教五頓六圓此約果顯圓説四又初人天次三三乘後二一乘因果分二也此上並是一念中益餘一切念準之頌中十偈初五總歎菩薩德後五頌前法門初中前三明自分德一自利二化他三得法後二勝進一外益二內圓後五中一現法二動剎三身嚴四入劫五説法此等並是上毛孔中事頌文巧略故也第二光示法主分中二初此界後結通前亦二初示主是教義源故二於彼下示法是教義相故初中四初明光意言無邊佛境者有三意一令知所説法故二即是普賢故三顯佛非不能説故二顯光名相中二先明光相眉間表中道一乘法也白毫表無流證道白淨法也又白為衆色本故表此一乘為諸教源也又毫者是長毛也又是毫毛也依觀佛三昧海經云太子時舒長五尺樹下長一丈四尺五寸成佛已放之長一丈五尺圓卷如秋滿月分明皎淨珂雪寶色光體也燈明光用也又理可貴故名寶色智普照故名燈明境智遍益故名雲也又如未尼同諸色故二立光名為顯因人故名菩薩也三辨光勝用中一事故遍故廣故二理故正故深故三辨説因故由大願力方有説也四顯法門故令衆知法從普賢門中出故上文既不云別照普賢何故乃云顯現示衆者以上所照即是普賢故四攝用歸本中毫出足入者表上法可以傳下傳下不失本故還入也眉間足下處別何故言還者顯上下無二故又毫光照普賢明果乘因還從足下入者明因成果也第二示法中二初辨蓮華是所詮義也二顯勝音是能詮教也坐華者稱義施教也初中一句總於彼者場地也又是相輪也蓮華者開敷故出三乘水故不染故微妙故衆聖蜂所採證故二寶莖者可貴故堅固故三藏者含攝故出生故具德故四葉者覆蓋故以廣大甚深故遍法界也五香鬚者氛氳眷屬故六閻浮檀金是寶中之上故金是貴相顯著故臺是高出故七結也此等並法門也若約三乘託此事別表法然彼事非即法若此一乘即彼事是此法仍有事顯現也二顯能詮中二初標體二偈頌明説相前中三先舉教從佛眉間出者表依證起説故教從佛出故如勝流法界又論云從最清淨法界所流法也出菩薩者為被因人故諸法是所詮勝音是能詮論云契經以文義為體也若依一乘看此菩薩即名見教體人法無礙故顯教圓故具主伴也順理故敬繞也二明稱義故坐臺鬚也三由稱義故令教誠實故歎德也德中四句一下愜群機二上順佛境三窮茲義海四令歸佛果二説相中二初勝音明教體殊勝二炎光明教威勝用初中三頌一明一佛遍法界而在道樹二多各遍法界之佛同坐一毛孔三如一毛一切亦爾各具主伴此三如是漸次增廣也又釋初一明舍那身滿法界後二明毛孔中現無量三世間重重無盡也二教威中師子者有三種一不畏義理深故光照也二不畏不益故炎燒惑也三不畏異學不降故奮迅也同是教故亦名音也頌中初明法輪義後釋文前中轉法輪義略作十門一釋名二辨體三種類四轉相五分齊六轉處七轉時八轉人九轉機十諸門一釋名者法是軌持義通有四種謂教理行果輪是所成義亦有四一圓滿義以離缺減故二是具德義以轂輻輞等悉皆具故三有用義謂摧輾惑障故四轉動義謂從此向彼即從佛至衆生故亦從彼向此即從衆生至佛果故法即是輪持業釋又輪是喻況如聖王輪寶即法之輪故依主釋二體性者通論教等四法為性剋性唯八正道為性以戒為轂謂正語正業正命以慧為輻謂正見正思惟以定為輞謂正定餘正念正精進為莊飾成輪此約小乘初教亦同又唯以無分別智為法輪體又唯真理為性此約終教或理智俱泯教果亦亡離言絶慮為法輪體此約頓教或通攝無盡法界謂人法教義等一切自在法門海並為法輪體如帝網重重具足主伴等此約圓教亦即攝前諸位此中皆具約同教也三種類者有三初小乘四諦之下各有四義謂苦空無常無我此四苦諦因集有緣此四集諦滅止妙離此四滅諦道如迹乘此四道諦此上十六約所知諦若約能知亦各有四謂眼智明覺眼謂總觀苦等智謂別觀過去苦等明謂別觀未來苦等覺謂別觀現在苦等是故四諦各四故成十六新大毗婆娑論第七十九云眼者謂法智忍智者謂諸法智明者謂類智忍覺者謂諸類智又眼是觀見義智是決斷義明是照了義覺是警察義三轉十六成四十八行法輪此約小乘如毗婆沙論具説二明三乘中法輪然有三義一同小乘三轉四諦通益三機如密迹經辨此則説四諦而具三乘又三轉即空常淨維摩經云三轉法輪於大千其輪本來常清淨此之謂也此約初教二唯説大乘亦通三根得大小果如諸大乘經中所説或分相開三如轉照持等三種法輪或合為一謂唯一實諦上約終教三離言法輪無轉不轉非四三一不可説故此約頓教三一乘法輪準下文有十諦差別謂説誠諦等諦各十行謂具足清淨四無畏等是故總有一百行法輪準下文亦有十輪謂過去願力故等即十轉百行為千法輪並尋下文應廣具顯何以皆言十者為顯無盡故此則無盡法界為大法輪海常轉無休息也四轉相者小乘三轉有二一為自轉初轉在見道名印相轉次轉在修道名應作轉後轉在無學道名已作轉二為他轉初名示相轉謂此是苦等令陳如等入於見道次名勸知轉謂苦應知集應斷滅應證道應修令彼入修道後名引證轉謂苦我已知乃至道我已修令彼入無學道若三乘法輪二同前説但義理差別約菩薩人者準大品等經既言鹿園轉法輪時無量衆生發菩提心等無量菩薩得初地等無量一生菩薩一時成佛此亦應同彼三轉是通非別不可別配若依一乘轉無盡稱法界法輪與所被機同一法界無二無別法爾常恆無新辨益之謂也五明法輪分齊者若小乘中有一義佛説四諦苦無常等語音入法輪攝如問阿難天雨等如是世語皆非法輪若三乘中佛一切語及身威儀皆入法輪以無不益生故維摩經云諸佛威儀進止無非佛事以此準之若一乘中通三世間俱入法輪一切衆生語言音聲亦入法輪國土法輪如剎説等準之六轉處者小乘唯一娑婆百億鹿園等處三乘或一百億或千百億或如恆沙為一佛化境一乘遍通樹形等界乃至華藏猶如帝網重重主伴經云此是盧舍那佛常轉法輪處七轉時者小乘三乘或二七日或三七日復或六七日或七七日或八七日或五十七日或一年等此並以是末教隨機見聞異耳亦無前後相攝等事一乘本教要在初時第二七日更無異説仍攝前後各無量劫念念無間一一念中亦各攝彼前後際劫亦如帝網重重無盡九世十世之所轉也八轉人者先主後伴小乘主謂釋迦生身及化身佛聲聞弟子為伴三乘主即三身佛聲聞菩薩為伴謂舍利弗等一乘主謂盧舍那十身普賢等菩薩為伴亦如帝網重重現準之九轉機者初唯為小機次通被三機後唯一普機準之十諸門者一教及念處等為法輪因由此得聖道故二福慧萬行為法輪眷屬三真俗二諦為法輪境四二障使習是法輪所斷五菩提涅槃法輪果諸宗準之釋文者頌中十偈分四初三明佛法輪清淨廣大於中初句標教主次句明法輪清淨清淨者滅惑染故現淨理故教輪淨故如梵輪也下明法輪廣大自有六門初一句巧説廣二一句説人廣三二句説處廣於中國土海世界海雙舉者此二相成故也四二句説因廣謂由大願力説盡來際故亦名説時廣五二句説機廣六二句言音廣二有二頌歎普賢能遍説法一佛力加故令語業普遍二身業稱理亦遍雨法三有三頌歎舍那佛説法一語業二意業出光也三身業四末後二頌歎三世佛亦同説法一令見説法二令聞説法下結通有二義一結上集衆通十方界二既在示法後結則知示法亦通十方示法主分竟也第三法主入定分於中二先料簡諸會中有四一有無者唯第二會無者以所表法未成位故餘會所表法位成故二出不出者唯第八不出以表一證法界無退失故餘表起化故三因果者初及七八為果定以初説果故七行深故八證玄故餘皆説因故又釋第七中亦以通有因義以華嚴是因行成嚴故若如此判通有四句或唯果謂初及八或唯因謂三四五六或亦因亦果謂第七或非因非果謂第二總無也四能入人者唯第八佛自入表法界解脫自在唯佛窮故初雖説果為令物信故七行雖深然是因人行故二釋文者於中二先此土後結通初中於佛前坐者顯因果不相離故何故入定者顯非證不説故為受加故除衆疑故何故入果定為説果法故何故因人入為被因人故淨有四義一自性淨二治惑淨三善根淨四益用淨藏有四義一含攝二蘊積三出生四無盡三昧此云等持離沈浮故定慧均故名等也心不散故住一境故名持也納法在心名為正受此中淨之藏淨即藏如來之淨藏如來即淨藏淨藏之三昧三昧即淨藏皆二釋思之可見下釋顯其義初句釋如來後句釋淨藏離垢淨也滿足藏也虛空喻上二也結通者此經一切處説總成一部謂一部即一切部今且舉此一方中事恐斷其本部故數於文末釣取一切結成本部以明無盡無盡也因此略明所入三昧分齊差別有十重一約一切定無礙故起分中言普賢菩薩從彼三昧起從世界塵數等三昧起解云此有二義一此定含攝多三昧故二此定遍入多三昧故是故此定即是塵等三昧海也二約一切處無礙如此文云普賢菩薩於此世界三昧正受盡法界虛空界等一切佛剎亦復如是此亦二義一定中包含十方剎故二此定遍於諸塵道故三約一切時無礙如起分云普賢從一切三世三昧起等此亦二義謂定含三世及遍入三際四此上三重融含為一普賢三昧無礙自在以此三説是一定故不相離故五於上塵等三昧海中隨一即具一切諸定各苞十方盡三世故六如一三昧一切亦爾七隨一塵內即見普賢圓明三昧各攝十方亦盡三際八如一塵內一切塵道皆亦如是九隨一念中即有普賢入塵等定各苞塵道盡十方剎及窮九世十世等盡十如一念中餘念念中盡前後際一切劫海皆亦如是如此十重為則餘一切位中及教義理事等準此思之入定分竟也第四諸佛加持分中二先辨諸會有二初有無者二七八三會無以二位未成故無入定故七行依法不異前故八佛自入定不假加故餘會非此故皆有也二佛遠近多少名異皆如文應知二釋文中三先口加及所為二意加三身加又初勸説以益辨次冥被以增智後摩頂而覺然加讚互成有四句一加而非讚如佛意身二加二讚而非加如諸菩薩偈讚等三亦加亦讚如佛口業四非加非讚如餘文也口中二初明加讚二釋所為初中三初明諸佛不移本剎而現身於此以明彼即此而不壞彼故遠即近而不壞遠故也如緣起性知之二讚得深定三明定因初他力後自力又果力因力緣起合成也又佛本願者明佛往昔曾見是事因即發願願今成也釋所為中為何義故加為説此法故於中十句初一總謂一乘法輪最初轉故以是果法輪故云佛也別中有九一所轉義法輪體也開猶現也二巧轉盡源法輪相也及十方者是結通處也三妙除惑障即法輪用也四十方齊轉法輪處也又窮土海也五轉因入果法輪分齊也六一門攝一切果法輪德也七巧令樂果即法輪境也八巧隨世俗法輪方便也九審根授法即法輪所被也同異成壞準思知之二意加中二先加後釋初中一總餘別別中一得法智謂五海智非一故云無邊等二盡邊智謂窮盡五海該三際佛三成壞智謂五海集散亦世界海也四所化智謂五海約染亦衆生海也五理智謂五海皆深亦法界海也六三昧智謂五海皆定境也七根欲智也八語辨智九身遍智十圓音智此皆通五海等準之與下十智大同也釋中先徵後釋問諸佛有力有悲何故唯加普賢不加餘耶答以長子故衆首故盡佛願底故本願故普德具故得定法故餘人不得故又凡有此定處諸佛法爾皆聚彼如海法爾攝彼衆流故云法也緣起法門理數爾也是故諸佛智斷亦得與人問佛何不自説答有二意一所説既玄恐因人絶分故也若爾何不餘人説耶為説普法故二明凡説此法必具一切諸佛共説若佛自説則理無加授便乖共説是故普賢一説即一切佛説也三身加中何故摩者令覺故令具佛威德故此中佛身未必來此申手未必修延各令觸頂未必相妨悉同時摩未必前後皆是緣起自在無礙思之應知加持分竟第五大衆同請分中二初長行怪不即説以生後請亦是具身意二業請謂恭敬身也觀察意也二俱專住一心也後正語業請中與上請何別謂此別請普賢故以知是説法主故又此具新舊二衆故不同前也所問之法不異前故不別列也十頌分三初八歎法主請二有一頌舉所説請後一頌歎衆樂聞請初中二先有五頌通歎普賢德後三別歎説法德亦即前歎有説因後歎有説果前中略顯普賢十種功德一因行願滿二果德平等初一頌顯之三色身普遍四福智深廣第二一頌顯五普見佛海六能現塵剎第三一頌顯七廣遍時處八深定常現第四一頌顯九體充法界十用遍生海亦是前智後悲第五頌顯又此十德攝為五對一因果二身智三見現四深廣五體用下別歎説德中初頌歎證斷為因普周廣説謂初句證理次句斷障次句普周下句廣説二一頌歎內外為因能益妙説謂初句歎普賢內證一切佛德海生次句歎外能普放説法光雲次句歎能益衆生堅其淨行下句由此故能妙説佛境三一頌歎深行為因能雲雨説法此上三中若約能説辨一廣説二妙説三頓説若約所説一佛法二佛境三法界下一頌明所説法初一句總舉下文華藏界等次句舉下文佛嚴淨事次句中能入是佛海法界海所入是衆生海及根欲海下句結請末後一頌歎衆有二德堪聞一樂欲二根器前中亦二一身離慢怠故云恭敬二心離異想故云觀普賢二根器中雖一心樂聞若無智慧不能領受此亦有二一深智達深理故二廣智鑒廣事故下句結請願説同請分竟第六定內略説本分中二先觀五海後説十智又前是所觀之境後是能觀之智又前是證本後是教本何故不起定而説耶謂明定不礙用故寄顯法深故雙行故初中二先明境海深故觀非自力二正觀審法五海略作十門一辨義相謂於無盡圓明性海藏中分茲五義一是所依義通一切準之二萌發義亦積聚義三軌用義四巧別義性別義五覺圓義此五皆一即具餘四並深廣無盡具德難思故云海也二約染淨有二一別者或唯淨謂佛海或唯染謂衆生海或俱謂世界及根欲或不俱謂法界二通者或俱淨以衆生等亦返流故本淨故或染以佛等亦隨緣故或俱或不俱思準之三約理事亦四句全攝可知四約人法有二先別者衆生及佛是人法界是法根欲亦人亦法世界非人非法二通者亦具四句全攝可知五約因果亦二別中世界俱法界不俱餘二句可知通中亦四句思準六約三世間七約境智八約依正九約三寶此上四門皆有通別句等思準十約融攝有二先約海謂世界即衆生如下衆生形世界世界即法界如法界不可壞蓮華世界海世界海即根欲如心作世界世界即佛如國土身二約衆生即世界如前説亦即法界如經即此法界流轉五道名為衆生亦即根欲如心心所作故亦即佛是十身中衆生身又衆生即真故後三海一一即具餘皆思可見二約智中亦二先別初三智是前三海智後七智是後二海智二通者謂一智有五海一海有十智鎔融思攝五海深玄寄半數説者令易信故十智稍麁寄十數説者會其本故是故境智不殊麁妙恆別此約一乘又如解深密經云如來所行如來境界此何差別佛言如來所行謂一切種如來共有無量功德衆所莊嚴清淨佛土如來境界所謂一切種五界差別所謂有情界世界法界調伏界調伏方便界地持瑜伽亦名此五名五無量此五既是如來境界故後説智名回觀智此約三乘問既觀海何不説海而説智耶答以海是證境故證欲説彼即是説智如人至寺觀塔熏在自心後歸家説塔即是説心非彼塔也問既在定得説後何須起耶答為寄法故何者謂在定觀海此在心中最細也十智觀海雖在定中然寄在言故次細也説分最麁就機故出定表示也是則説以智為本智以海為本以説依智成智依理起故文中三初據智二許説三明説意此中佛子有五義如攝論一願樂大乘為種子二般若為母三定為胎四大悲為乳母五諸佛為父又有十義如下彌勒知識處説十智者一由成即敗故成淨也敗亦爾由此即具餘九等故名不思也此不思句遍下九句二中以衆生空有不二故類多故相即故相入故具一切法故根性多故故亦不思又界是如來藏隨緣作衆生名起也又起在智中也三中一約有為二無為三俱四不俱各通染淨思準之根欲攝在上二智中亦在下七如上問中辨下七明佛海四無礙故五稱根欲授故普轉故六顯德故七光音故八三輪攝故九深定故相即及體用皆不壞也十以總結別也本分竟第七起定成益分中二先起主伴定前明定不礙用故説十智此明用不礙定故云不壞不壞彼定故也云何不壞以由方便智釋顯也二起益中二先內益亦二初益此衆有四一證法體二依證起巧智三依智起妙辨四説無斷絶謂由願力故也二結通顯圓二外益中三初動二益謂動時令恐返此故樂也又安善因授樂果又動時令壞返此故寶嚴三雨寶謂是法門也以是減十故標十列七也第八毛光讚德分中二初一切如來毛孔及光等是上能加佛也讚普賢德顯具德説法令衆尊重生渴仰故也是上光明讚歎音聲智二十四頌中分二初八歎普賢廣大三業盡佛源底於中初三身次半語次二半意於中初一半定後一慧次二盡佛源底後六歎體用普遍無礙應機於中初一體遍謂普賢身在此會坐即於十方無邊世界一一皆見常在彼處本來當處而身不分亦無來去一切塵中一切衆生身中皆亦如是以衆生等即如故是普賢也而實一乘佛國亦同普賢圓遍即就勝易解故簡土約理寄三乘顯一乘耳思之可見後五明用一現身二現法三淨願四衆生五現智第九許説令喜分中亦二先長行標意謂前聞本分已生歡喜今更許説分故云重喜二頌顯喜事於中有十頌分三初二頌半舉佛化德超情不測於中一深智説法二嚴土調生後半通結能化所化無盡難測第二有五頌半誡衆令淨堪為法器於中初半簡不堪聞言樂惡者作惡趣因也著有者設作善業不求出離下句結非謂不能了等顯非器也次一頌明具三力方堪為器一宿善根力二近善友力三佛護念力下句結云是等衆生能得上智次一頌具七心方堪聞法一直心離諂曲故二淨心離求過等故三慈心為益物故四悲心為救生故五深心為修行故六信心受深法故七無厭足心渴心無滿故下句結云彼聞此法喜無量也上來二頌十門通辨一切堪聞法器次二頌別舉此衆初一明具四德堪知佛境一住普賢地二具普賢願三行普賢行四證法界空下句結知佛境次一頌歎此大衆現得二利一現前見佛二得普賢方便後一頌通結但諸衆生得聞佛法皆是佛力第三有二頌舉法許説勸觀令樂一舉法勸觀以佛及剎在身內故勸衆令於毛孔中觀後一明具普眼方覩此法下句許説誡聽可知下十眼中第十普眼者平等法門見法界故若通論總具十眼名為普也第十正陳法海分中先明諸會能説人異唯僧祇小相二品是佛説餘並菩薩説所表如下釋又依智論有五説一佛説二弟子説三神仙説四諸天説五變化説此據出聲名句等若望授與即通情非情此約三乘又有五説如下云佛説菩薩説剎説衆生説三世一切説此通三世間等一切法約一乘也文中二初廣辨世界海答前果問二從乃往過去下答前因問初中二先散説世界後偈頌總持前中二初通論十世界後別辨華藏界亦是釋第十壞世界以成即是壞故前中二先標列章門二依門別解初中三先總告引證二正列十名三結其無盡此十中初者有四義一以土體絶相由言方成故云説世界如四堪智中成也如下緣生中説縛觀等二由名言熏識現土故名説也三土中言音如下頌中辨四世界立名不同故云説也初一説即世界後三説之界二攬緣界三依故得久四外狀區分五內體盈滿六德相嚴麗七離垢用淨八器淨佛興九經時多少十緣散離作皆繁多深奧同名海也凡一世界即具此十今通釋諸世界海略作十門一種類二居人三名體四染淨五漏無漏六共不共七世間涅槃八依正九人法十無礙初明種類者小乘唯有一類娑婆等界無別淨土三乘中有二一約佛自住處有三一法性土二實德土謂妙行等三色相土謂勝寶等後二為自受用土此三非是攝化處故此中不辨也二約佛攝化處亦有三一化身土此有二一染謂此娑婆等此約釋迦二淨謂餘方化土此約餘佛二變染土謂足指案地等三他受用土謂十八圓滿等初中二若依始教唯有百億閻浮百億釋迦為攝化境若依終教如智論中以三千大千世界為一數數至恆沙為一世界性數此性復至恆沙為一世界海數此復至恆沙為一世界種數此復至無量恆沙為一佛世界所化分齊其受用土若始教在色界頂為引小乘同界説故若依終教不在三界如涅槃云西方去此三十二恆河沙佛土有世界名無勝是釋迦佛實報淨土又於一切須彌樓山世界畔間往往數有一淨佛土此通報化為引衆生三依一乘有二一約果分十佛自體國土海此當不可説寄緣説十如第二會説二約攝化處有三類一從須彌山界及樹形等已去乃至一切衆生形世界海為第一類二三千界外別有十世界一世界性二世界海三世界輪四世界圓滿五世界分別六世界旋七世界轉八世界蓮華九世界須彌十世界相此等當萬子已去輪王境界為第二類三十蓮華藏莊嚴世界海具足主伴如帝網等是佛境界為第三類此上三類通有十事為首成世界一説世界海二起具因緣世界海三住世界海四形世界海五體世界海六莊嚴世界海七清淨世界海八如來出世世界海九劫世界海十壞方便世界海二所居人者若小乘唯有有餘依聖及凡位居也三乘三中初二通有凡夫二乘及地前菩薩并佛化身居也後一初地上菩薩及佛報身居也解深密經中三地菩薩生佛淨土者彼約七地明義即初地當彼第三也又起信論中許地前菩薩見報身佛者彼約終教依三昧見也一乘三中多分論時初見聞位次解行位後向果位通即可知三處佛身同是十佛也三名體者世是時界是分齊謂於時中分齊顯現從相得名繁多奧積深廣難窮同名海也世界即海從喻持業釋也若小乘以子母七微及色等四塵并能造四大實色為體若三乘中凡小地前俱以賴耶識為體地上二義報土亦同賴耶識為體若二智所現即以唯識智為體故攝論云菩薩及如來唯識智乃至為淨土體故若依終教俱以如來藏真如為體若一乘以無盡法界通三世間人法理事等諸行相即互為其體準思可知四染淨者若小乘唯染三乘有二一約位二約法初中有四對顯其染淨一約因果謂金剛已還菩薩所住名果報土不名淨土以過患未盡故唯佛一人使習都亡所居名淨是故仁王經云三賢十聖住果報唯佛一人居淨土二約一向非一向謂八地已上菩薩所住得名淨土以一向出三界事故具足四句一向義故謂一向淨一向樂一向無失一向自在七地已還未名淨土以非一向出三界故縱由願力而得出者四句一向不具足故謂無流觀智有間斷故非無失等也此依攝論辨三約純雜謂凡夫二乘雜居之處不名淨土地上菩薩生處名淨故瑜伽論説世界無量有其二種謂淨不淨清淨世界中無那落伽傍生餓鬼亦無欲界色無色界純菩薩衆於中止住是故説名清淨世界已入第三地菩薩由願力故於彼受生無有異生及非異生聲聞獨覺解云此第三地既名淨意樂即是歡喜地以約七地辨故四約退不退謂入十住已去不退位三賢菩薩生處名為淨土於中亦有四果二乘等如阿彌陀土生彼皆住正定等堪任已還輕毛退位三聚衆生共生之處不名淨土此四對八義中初約果唯淨後約退唯染中間相形皆通染淨二約法四句者或唯淨謂於上四門中形取淨故退位所居自性淨故或唯染謂四門中相形取染故佛果隨緣約機説故起信論中名隨染業幻所作也或俱由前二義不相離故或俱非以二義互融非定一故二相盡故一乘亦二初約類中初類染後類淨中類通二二約法中或俱淨以即佛故或俱染即衆生故或具二由前二義不相離故或不俱以二相融二相盡故上三類中一一皆具此四句準思知之第五流無流者若小乘唯有流三乘有二門一隨相門二融通門初中四句一唯有流謂凡小地前所變土二唯無流謂佛所現土三俱謂地上菩薩二智所變及賴耶所現此二雖為苦道二諦攝然無別二體但隨義異攝四俱非謂皆即空故不墮數故此上約始教二融通中亦四句一或一切皆無流乃至凡位亦爾以離諸流性故如經云色無流無繫受想行識無流無繫乃至廣説二或一切皆有流乃至佛亦爾以不離流法故如經言諸佛安住三毒四倒五欲等中得阿耨菩提乃至廣説前句不異流之無流故即無流後句不異無流之流故無流即其有流三俱以前二義不相離故四俱非以皆離縛脫性故如經言色無縛無脫受想行識無縛無脫乃至廣説一乘中如緣起法界若無一即一切不成互融無礙亦具四句全攝可知思之第六共不共者於中有二先明分齊後顯義相初中隨一世界皆是有情謂異熟識由共相種成熟力故變似色等器世間相問凡一世界有幾有情異熟識變答唯識論中有三師説初師説云一切有情以契經説一切有情業增上力所共起故次師破云若爾諸佛菩薩應實變為此雜穢土諸異生等應實變為他方此界諸淨妙土又聖者厭離有色生無色界必不下生變為此土復何所用有此三種大過失故明不得通一切有情應説現居及當生者彼異熟識變為此界經依少分説一切言諸同業者皆共變故後師轉破第二云若爾器世界將壞時既無現居及當生者誰異熟識變為此界又諸異生厭離有色生無色界現無色身預變為土此復何用設有色身與異地器麁細懸隔不相依持此變為彼亦何所益亦由如此三種大過是故現居及當生者皆不成變謂初器將壞當生現居俱無受用二若現受無色界身而於此土無受用義三設有色界身與此麁細異亦無依持受用是故此三俱無變義若爾誰識變耶正義應云凡所變土本為色身依持受用故若於身可有持用設令生在他方自地彼識亦得變為此土故器世界將壞初成雖無有情而現有土此土並依唯識論辨第二顯共不共義相者若小乘中既是極微所共合成故唯是共若三乘中有四句初或亦唯共謂彼依報雖不離識而識是別土相是一由彼彼識中共相種子共所現故如攬四塵共成一柱一柱之相不離四塵非隨四塵而有四柱當知此中道理亦爾若自受用土佛與諸佛共有一土猶如法身諸佛共依故以是同法性土故若他受用土亦佛與菩薩之所共有如王與臣共有一國諸雜染土亦是有情共業所現故無別也二如是依果實皆不共以各於自本識中現故論云俱是有情異熟識各變同處相似不相障礙如衆燈明如多所夢因類是別果相相似處所無別假名為共實各有異諸佛淨土亦復如是各別識變皆遍法界同處相似説名為共解云若有一土不隨識別則心外有法不成唯識論云我説識所緣唯識所現故由是當知皆自識變故各不同三亦共亦不共者由前二説不相離故瑜伽云外等諸物或由不共分別為因或復由共分別為因若共分別之所起者分別雖無由他分別所任持故而不永滅若不爾者他之分別應無其果彼雖不滅得清淨者於彼事中正見清淨譬如衆多修觀行者於一事中由定心智種種無量異見可得彼亦如是解云此説依報隨共分別其不共分別同前第二是故隨外器世界皆具如是二義而成故雙存也四非共非不共者有二義一由前二説互形奪故隨定取一不可得故是故俱非二由土依識土相盡故識從緣起無自性故是故共與不共性相皆離不可説也此上若約果報賴耶識所變等即是初教若如來藏賴耶所現即屬終教若一切相盡唯一淨心平等平等離言絶慮即屬頓教若依圓教有二義一如前諸教所説即同無盡法界帝網重重即入無礙具足主伴即屬此攝二以義求亦有四句一或唯共以同一法界故相即故二或唯不共以緣起各別故相不雜故三或俱以上二義不相離故以全體相即而不壞故四或俱非以二相泯故形奪盡故第七世間涅槃門者有二初隨相二融通初中有四句一或唯世間謂地前及凡位所居二或唯涅槃謂諸佛果位所住涅槃設自受用土亦得是彼大涅槃攝三或亦世間亦涅槃依寶性等論依無流法界中有三種意生身應知彼因無流善根之所作故名為世間非是有流業煩惱作亦名涅槃依此義故勝鬘經云世尊有有為世間有無為世間有有為涅槃有無為涅槃解云有為世間是凡位無為涅槃是佛果有為涅槃無為世間是變易報所望異故屬俱句四義準諸佛清淨法界是非世間非涅槃以非是二乘涅槃故又亦非雙林涅槃故二融通者亦四句一或唯世間謂佛淨土亦悉是器世間攝故二或唯涅槃謂衆生染土亦相盡同性故三或俱以理事無礙故論云世間與涅槃無毫釐差別以無別故無二而二雙現前也四以無毫分別故二而無二形奪俱盡故俱非也經云如來不見生死不見涅槃又此經云世間與涅槃二俱不可得此之謂也第八依正門者若小乘是唯依報三乘中器世間雖是本識及鏡智所現而唯依報攝若依圓教中通三世間以舍那佛有國土身等是故世界悉是佛身又有衆生形世界等是故衆生即世界此並依正混融無礙故也相即自在故第九人法門者小乘非人法三乘可有是法門義一乘具有是佛普賢及衆生等故唯是人或諸世界並是法門故如文云清淨妙形入於無量正法之門此明世界等悉是法門第十無礙門者小乘世界唯是事相於上但有苦無常空無我等理三乘中法性土唯理餘皆是事然上二宗理之與事非一非異名為無礙若一乘中略有十重一情事無礙謂應情顯現事超情外文云喻如幻無方皆從妄想生二理事無礙謂全同真性而剎相宛然文云法界不可壞蓮華世界海等三相入無礙謂文云以一佛土滿十方十方入一亦無餘等四相即無礙謂文云無量世界即一世界等五重現無礙謂於塵中見一切剎剎內塵中見剎亦爾如是重重如因陀羅網六主伴無礙凡一世界必有一切以為眷屬七體用無礙謂一剎海必有大用赴機説法八隱顯無礙謂染淨隱顯異類隱顯等約緣定之可知九時處無礙謂或於一剎現三世劫或一念中現無量剎如是無礙十成壞無礙謂成即壞壞即成等無礙顯現自在難知超過情慮此十無礙同時具足應以六相方便而會融之十世界義略辨如是諸餘義相隨文當顯第二依章別釋中十內初一不釋以釋餘九即為説故文中初釋前八後釋第十前中初七各二謂長行及頌初文無頌初中長行內四一標二成三辨四結一切世界海者是彼三類各各非一故也已成等者一以此諸緣通成三世一切世界而諸世界已未等異二成一世界即遍三世前緣通界別後界通緣別思之此約一乘八緣中一後得通慧二緣起法爾三所化業力四菩薩行滿應於彼界而得成佛則由此力彼界得成五普因成也六菩薩為嚴淨無餘剎故修願行剎隨願行無礙容持故云解脫自在七大覺正因八普願攝成然此八中初四是權成其麁相故亦通染後四約實成其細相故唯是淨如經我此土常安穩等而一世界即具麁細故也又此八中總有四對一初及第七約佛明權實二八及第五別約普賢明權實以第八是為物故三四及第六通約一切菩薩明權實四第二及三約理事為權實以業行緣成不實故也何故要具如此四緣謂佛為教主普賢是助化菩薩及衆生所化初二中若無權無以熟生若無實無以應真後二中衆生業報緣虛後必有所依真性如此八種等塵數因緣成一世界皆互無障礙全體遍收作不作等如緣起性即空即有即一即多融無分別思之餘一一界準之頌中有二十分七初四頌前佛神力於中一剎依鏡智現二土以行修成三化菩薩四悟衆生次四菩薩應得道力於中初上半明行因下半明智果度猶到也二上半明土因下半起土果三上半依正因成下半明證入依正果境四上半果廣下半因久次二頌衆生業力次二頌菩薩嚴淨佛土願行力次二頌普賢善根力次四頌普賢自在願力次二頌佛依果故也此頌總通緣起異義即為法如是故不別頌也第二住中長行內二先具標數謂凡一世界即具如是剎塵所依故云一一也二略列七事一依善淨力住二依無礙三依如意寶或一切四依通明五依緣起力六依法身持七依法界願依智論中摩訶名大那名無伽名罪此約無失義釋又云或名大象即陸行中力大也或名大龍即水行中力大也又初如善調象能破軍敵約自利也後如大龍降雨約利他也頌中十六半分九初一頌依莊嚴住二一頌虛空住三二頌依寶住四一頌佛光謂威神是也五一頌力士六五頌上標中剎塵依此猶略也七二頌幻業八一頌普賢願力九二頌半通顯因陀羅網安住相初偈一塵內現依正後一半類多塵可知第三形內長行中別列七種初四及七當相辨形五六二種約喻顯狀一方如斗二圓若珠三非方是四維形四非圓是八隅形五水洄洑形六華形七衆生形者謂有二義一有世界似衆生形二即種種衆生皆是世界如身中八萬戶蟲各有九億蟲等此即是世界準下文亦是舍那佛轉法輪處也是故文中但言衆生形不言如衆生形故知即以衆生為界也此等一一形類皆遍法界頌中十七半分二初三正頌前文後十四半明剎德用前中初一頌上總數次一頌上別形但頌初四略無後三依智論摩尼珠有八楞喻此隅形也後一上半顯因異下半明果相二德用分二初六半明德自在後一毛孔下明用自在前中初三約佛顯剎明堪應機一體成法門二相顯臨機三舍那光照是佛所有也後三半約機正應顯成差別一機心業異感土多形二佛土自在能隨感現異三雖應成染淨而法流不斷四下半結業多門感現難測二明剎自在中三初四明依正自在次二出其所因後二結用歸主初中初二毛孔現剎佛於彼中為衆演法毛孔即明正報攝依佛還在自毛孔之內後二塵內所現種種形界佛亦在中轉尊法輪塵是依報攝正等也二出所因中由何得此自在容持一由佛誓願自在力故二由衆生心業不思議故三結歸中初一舉塵內佛次半舉塵內剎下半正結歸主第四體長行中別內五並約事顯也凡論土體有五重一真如二真智三本識四五塵五諸事諸事即法門將為歎故是以文中辨也頌中十行一寶華體二炎空體三光明體四電光及願體五日珠體六寶炎及化體七佛化體八心業起體或業起心海成土或心業起土或妄念為體九佛身光體十普賢化願體此等並是任放辨才説不待次故也第五莊嚴長行內別中有四一雲通相二染業行三淨因果四結可知頌中十偈分五初一頌上總數次二偈頌雲嚴次一頌上衆生業嚴次五頌上佛嚴於中初二嚴依次一嚴正謂佛數等衆生故也或衆生數等佛也次二雜嚴後一頌上普賢嚴第六清淨別中有五一行緣淨二自利淨三利他淨四行滿淨五得位淨皆從前起後可知泛論土淨有七一當體淨謂以淨識為相等二事相淨謂淨寶等故三受用淨謂受用此土滅惑成德故四住處衆生淨謂有德衆生滿此世界故云淨也五主淨謂佛之土等六淨行因生故如文無量行海所修集等七淨行即土故云清淨以行為依止故也如文可知偈中九頌分五初一偈頌上總數次一頌親善友次二頌上自利謂一三昧行二信忍行次一頌上利他次二頌上二行滿次二頌上得位益第七佛出世別中三句初約現身普遍謂以二身遍滿一切差別法界一一之處皆身全現亦不分身亦無限分故也壽長短者如須扇多佛旦成暮滅迦葉七日釋迦八十等此謂短壽彌勒八萬彌陀極算等為長壽皆由機感故致然也又初約一切處現後二句約一切時現謂長短具故為一切也問若爾處何不然答差別法界遍多少通有無故云遍滿也頌中十偈初三頌前長行初一頌總次一頌身遍後一頌修短後有七偈明佛出現無方勝用此中分七初一嚴土多少次一説乘多少次一救生多少次一化現廣狹次一圓音普應次一主伴遍充次一慈海普現總結也此中或短壽度多生或長壽度少生或長壽度多生或短壽度少生或短壽説小乘或反上或長壽説多或反上如是等與虛空法界等皆是慈海力所現故也第八劫中略無偈頌總中塵等劫住者非是一一世界各住塵等劫良以一一世界劫住不同長短差別如塵等也所謂下別舉二門有如是下總結差別劫義如別説第九釋第十壞方便世界海者但壞有二種一成即壞以諸緣各無作故性自壞故二三災壞即事壞也今此文中辨初義下重頌偈中明後義故又釋初即壞成後即成壞壞故名方便壞也又以後壞亦從緣無性故何故須俱壞者欲令見心盡故成壞圓通故問若爾亦得初即不成故成成後即不壞故成壞此則壞成俱成何不爾耶答理實應爾但為此文釋第十壞義非釋成故不辨也文中有二先舉意總告謂分別華藏開示群機二正明所説説中三初舉主辨因二有須彌塵等下明因所成果三是佛常轉法輪處結果屬主初中三先總辨謂從初發意即修此因明因深果厚也問瑜伽論説一切諸佛要經三阿僧企耶劫修行成佛無增無減何故此中乃説阿僧祇箇世界一一世界並末為塵一塵為一劫據此則有不可説箇阿僧祇劫何故不同耶答彼約三乘據一方化儀唯就此須彌樓山世界説是故寶雲經云我為淺衆生説三阿僧祇劫修行然我實於無量阿僧祇劫所修行也此是約會三乘歸一説此文約一乘該通十方因陀羅網等及樹形等諸類世界説又為約法辨時以法無盡故時亦無盡文中且舉十大數中初數為則亦即通帝網喻故亦無盡也問若爾一劫即無盡何不但言一劫耶答此中無盡無盡故也又德無不備曰嚴垢無不盡曰淨又初即福智交飾後斷德離染又亦得嚴即是淨嚴故也別中泛論土因有二種一依因謂真如淨識及鏡智二生因謂諸妙行願今約後義略陳三種一廣福二大願三妙行初中一一劫者時廣也一一劫中供塵等佛者田廣也又是佛故田深勝也準下地品應有一切供具即供具廣也以上心深心即供心廣此文存略故耳準地論恭敬供養各有三種應尋彼文新金剛般若論上卷亦有三種供養一給侍左右二嚴辨所須三詢承法要二願中一一劫時廣也一一佛所者勝緣廣也塵等願願廣也謂以大誓自要要成此果即要期願也又所修福行悕成此果即悕須願也對佛發弘為修真實離染為淨又十大願中淨佛國土願及餘諸願應尋論之三妙行中修時廣緣深廣行事廣可知亦對緣進造曰修修成離染為淨謂十度六度等行乃至一切行準之又三中初自利後利他中間通二利又亦可具四多即四修一塵數劫即時多為長時修二塵數佛所即供佛多為恭敬修三一一佛所發願即願多為無間修謂願心相續也四塵數行即起行多為無餘修第二所成果中分二先明此主世界後辨結通前中有三初顯本世界為依持處二從此香水海上有世界性住下明次重顯雜類世界性三從香水海名樂光明下更重辨十二佛國土七世界性然此本師佛攝化境界諸教所説分齊不同若小乘中但有此一娑婆世界若三乘有二一化身化境謂此娑婆等二他受用身化境謂十八圓滿淨土等若約一乘十佛化境蓮華藏莊嚴世界海有三種一蓮華臺藏世界雖遍法界對地上菩薩機現有增減寄在色頂唯説一界二即此遍法界之華藏説十顯無盡即無盡箇華藏一一皆遍法界三樹形等雜類世界一一皆有蓮華藏並似彼界悉遍法界各各有十無盡無盡此三中初一約同教一乘辨後二約別教顯耳今此文中據須彌山世界中辨華藏故是故風輪水輪還似彼也以易信解故印機而成故初文中分二初別顯嚴相後一一下總結前中有六初辨風水華地為根本所依二明地山上海嚴等三地能映現嚴四地上香海嚴五海間香河嚴六河間寶樹嚴此六段中各有二謂長行偈頌就初段長行中有五一風輪無礙持二依風有香海三依海有蓮華四依華有世界五依界有圍山初文有三初總次別後結別中前七各持寶地中此有二義一謂一風輪上有一寶地如是次第二其諸寶地皆遠在蓮華上然此風力雖緣起門各別主屬無礙任持故是法性風也此中風有二義一無礙義二有力義故成緣起也寶地亦二義一可貴義二依持義人法解行等法門準之八持時者以時依法立無自體故説持也須彌山地是下文所持雜世界處事遙有所主故一切有者一是諸世界中三有等也二亦得通是寶地上諸莊嚴事為一切有又以義求前七次第從細向麁但屬持諸寶地後三漸麁持下文所持諸世界性四時三有等又此中最下風輪超越持於華上寶地最上風輪鄰次持於華下香海者顯上下鎔融自在無礙故為異彼染土醎烈海故言香水海也香有二義一普熏義二芬馥義水亦二義一清淨義二洗濯義海亦二義一深廣二具德又有十義如下説以具主伴故云一切也華中二初句辨義大蓮華者梁攝論中四義一如世蓮華在泥不污譬法界真如在世不為世法所污二如蓮華性自開發譬真如自性開悟衆生若證則自性開發三如蓮華為群蜂所採譬真如為衆聖所用四如蓮華有四德一香二淨三柔軟四可愛譬真如四德謂常樂我淨如此等並為依止義故也彼論又約一復次釋謂如來願力所感大寶蓮華王為淨土作依止也華藏之名因此立也下句香幢等者依義立名名有四義一香有二義一約體是氛氳義二約用是普熏義二幢亦二義一約體是獨出義二約用是降伏義如帝釋幢等三光明亦二義一是照暗義二現法義四莊嚴亦二義一是具德義二交飾義此中香即幢香幢即光明光明即莊嚴皆持業釋亦通依主準之下明所持二句初句中華義同前藏是含攝義出生義具德義此中通論有二義一由此土內含攝一切人法等諸法門故二含攝一切諸餘剎故下句金剛亦二義一是堅義二利義山亦二義一是高義二是靜義圍繞亦二義一是內攝益義二外防敵義謂以金剛外敵障不能侵內德增長也偈中二十頌分二初七略頌前文後十三明勝用利益前中分五初一頌舉果體用次一頌前因中供佛淨福次二頌前大願次一頌前果內風持寶地次二頌前土因大願以是任放辨才故説不待次也第二勝用中二先六頌明依報用益後有七頌明正報用益前中二先明勝用有四頌一世界光二菩薩光三華色光四淨寶光並是智等法光故能充照法界後有二頌明益相初一滅惑成德二覩帝網法界後正報用益亦二先明勝用有二頌一明剎外佛用二明華內佛用又前珠中菩薩遍十方此則華中諸佛等衆生界依正無礙故也下明益相於中五一舉所益機二興普教三巧調機四令住自分斷德五令聞勝進智德問何不佛等語説法而於光雲等説耶答以此明剎用故爾也問若爾何故辨佛光等耶答以依正圓融故佛亦是剎也問此中意辨華藏界何故乃説諸雜化用耶答有二義一以此是剎用故辨用顯體二即此化用為依止故即是剎也問何故與長行不同耶答長行略標頌中廣顯故也第二總明山下地海嚴者長行五句初二句顯地名謂蓮華臺面為寶王地二明地鎮海三地相具德四地體堅固五明地勝用於中初句出法寶後句起智照頌中十偈分二初六明衆德嚴後四明法行嚴又初是體備衆德後明妙用自在又初依後正又初事相嚴後法理嚴又初法後人又初頌前文後明異義並可知初中前一總辨嚴因次二頌上山地於中初一標謂寶輪香輪為山上嚴珠輪衆寶為山下依後一釋謂初二句釋上寶輪嚴次一句顯上香輪下一句辨莊嚴義梵云斫迦羅此云輪圍山也次一偈頌上體相二嚴謂初體後相次一偈頌上香水海次一偈頌上地勝用亦是海岸邊寶地上即有寶樹樹下座上有佛菩薩之身也第二段中四偈初一總明身語法輪次二別辨身色依正無礙於中初一佛現多嚴具之中次多佛現一嚴具內即調物為法輪也又前華香幡蓋中菩薩充法界此則寶幢寶樹莊嚴中衆諸佛身雲滿十方並以正為依也後一偈別顯上語法輪此即剎説也此上通三世間圓融無礙隨入一門皆具一切故致然也又此等諸文長行所説則編其次第令隨事生解偈中所頌則融其始終圓通無礙順於法性長行以法就機偈頌會機歸法文家綺互善巧之相應知第三寶珠嚴內長行中六句初句顯寶名謂山為外墎世界居中故云內也非在山中為內名不可壞有四義一體不可壞謂金剛末尼故二德不可壞謂藏攝衆寶同在自中衆寶不相破以無相不相形奪故自亦不壞以無二故三用不可壞謂雨物多端互無奪故四映不可壞謂能映現多身不可奪破現處重現不相礙故二辨珠勝用謂洞徹明煥故能現也此中映是能現影為所現也何故不現佛等及餘剎耶謂彼非所化故若爾何不現心念耶謂非色法無現義故三寶華嚴地中以為莊嚴者通上二句同嚴大地四雲嚴五香嚴六三世嚴者謂三世諸佛嚴華藏界皆與此同又亦此嚴同三世故也又所嚴藏體通三世故縱於現世以一華嚴由同所嚴故即通三世是知一華一鬘皆遍三世三世俱現各具過未即該九世也又以猶用也縱所嚴剎唯在一念用於三世一切嚴具而莊嚴故即所嚴同能嚴而遍三際也又亦得能所一念即含九世通相即入故具十世以顯無盡也於上四釋後三為勝頌中十偈分四初一偈半頌上不壞摩尼次二偈半頌寶華嚴次一偈頌雲嚴次五偈頌三世剎嚴於中初一地現三世行次一地塵俱剎入次一菩薩受用嚴次一佛法體用嚴次一得普賢願及佛智者能入多剎第四香海嚴中長行別內十四句一香寶岸二寶網覆三寶水流四衆華敷五末香其水六出佛音七香普熏謂教法所及也八寶階道謂入法階梯也九珠欄楯謂防外非守內德十潮浪聲十一華閣圍十二華城周外十三香華布水十四香樹為嚴並即事即法可準思之頌中十偈初一頌海二頌岸三頌水及佛音四頌階及欄五頌寶樹六頌華布分陀利此云白蓮華也七頌寶網八頌華城九一頌以周其外十舉因結成第五香河嚴內長行別中三句一華覆二出處三隨流以依正無礙從佛出為表正故眉間出謂教河流潤從證智出故也然教帶真義故寶王隨流不失真性即隨緣不變無二是也頌中十偈一總明河相二涯岸莊嚴三香水流浪四回旋所至五踊寶自然六河體普周七網演因修八岸聞果行九河周舒因十河原從果第六寶樹中長行內五句一明樹體謂無流法林樹等即衆德建立義也二寶幔覆即大慈普覆三因力所起四果德加成五極盡嚴際頌中二偈初一頌果行自在後一頌因行所起又此二頌即是樹以人法無礙故第二總結中分齊境多別説難盡故總云一一然於一中嚴事猶多故總云塵數又嚴別難彰故通云清淨可知第二大段明第二重依前蓮華臺內諸香海上所持諸雜世界性於長行中初總後別別中先辨所依住有六後顯能依形有九此中世界性者謂積世界成性積性成海等如上所引智論説又此下文於世界海中有世界性世界性中有一世界等故知積成也何故名性者有二義一望前諸界攝諸流類積結成性如久習成性等二望後海等有為因義故亦得名性問積界成性界亦因義何不名性答無融結故闕初義也問十世界中海望於後亦積成餘界何不名性答初積結攝已得性名後開異義轉立別號故不名性也頌中十偈分四初二偈頌上住形二有三偈明剎有色聲莊嚴顯體德圓備三有三偈明諸剎土即入無礙顯妙用自在四有二偈明三世間自在即顯攝化勝用依正無礙也第三大段明向上廣持諸剎於中二初牒上海及海上華二辨持剎及性此中十二佛土七世界性有諸德釋為華藏界外十方國土詳其文恐不然既取華藏內香海中蓮華而持故知非外況下文結屬舍那故亦非外但此中大意明衆香海中略舉一海一海所持十方剎中略舉一方一方既爾説不可盡餘方例準一海所持十方無盡皆遍法界餘一一海皆持十方各遍法界無礙圓融無盡自在即不可説不可説也大意如此思之二所持中二初一方後結十方前中二先明十二重佛土後辨七世界性此十二佛土有人用配十二因緣有配菩薩十二住等一一釋之義恐不然豈以十二數同即便配釋但此經所明皆應十數以顯無盡縱有十二七八等數皆是增減之十如地論釋還是十數豈得配耶況義理又別又此經所説一事一土皆遍法界具足一切人法教義因果理事等一切法門非適一相故不可以一門釋耳上下諸文皆準此知問若爾上來諸文何故皆以一二義等釋耶答還以一切之一釋故無過是故或一不少或多不增為成文故布之前後深須得意多少無礙又泛論佛及剎立名不同略由五相一或因機感二或由佛本願三或依本行四或先佛記別五或表示法門此中佛及剎土依正圓融可以法義而消息之塵數香海及世界性準釋可知又有義此上總為二重初辨此佛華藏土及所持世界性後從十二佛土下辨他佛土亦持世界性總為二對須思之結通及結屬並可知第二重頌中有七十頌但頌次前長行中事非是頌前十世界海及華藏等以彼各有偈重頌訖由前十二佛國七世界性皆通有此十海義故是故偈中頌顯其狀與彼長行綺互廣略亦同前諸文於中分二先九頌總頌前文二餘頌別頌前中十海初中有四初一顯根本所依華藏土海次三總辨能依異類諸剎次三別略顯能依剎形後二通舉佛剎大用第二頌十海中文則為十初有十一偈頌起具因緣世界海於中有七因緣初三頌神力因此中初一就本無壞後二隨末虧盈二如依種種下二頌頌業種因初一報異後一業殊三譬如意寶下二頌頌願力因初一寶珠現色喻後一就現空雲喻四猶如工幻下一頌幻業因五如見彩畫等一頌頌心畫因六衆生心不同等一頌頌妄想因七猶如見導師等一頌頌心行因此七何別者初是現威神二是種子三是宿願力四是現行五是本識現六是轉識相七樂欲器故別也二無量真珠下二頌頌莊嚴世界海三或有佛剎地下四頌頌清淨世界海於中初一唯染次二亦染亦淨後一唯淨以初一衆生次二菩薩後一諸佛故令所居土有染淨此三漸次向淨故也四一佛國土中下四頌頌壞方便世界海亦初一唯壞次二亦成亦壞後一唯成無壞以染可壞淨常存故五或有佛剎起下二十頌頌體世界於中初六純染苦體次四雜苦樂體後十純淨樂體於中初五隨事辨體後五妙用自在六或無量佛土下三頌頌住世界海於中初一舉能依之形後二顯所依住相七或如師子座下三頌頌形世界海八或壽命一劫下二頌頌劫世界海九或國土無佛下五頌頌佛出世世界海於中初一總標次二明化身示現次一機熟無時不現後一非器無時有現十或剎極濁惡下七頌頌説世界海於中初二惡道聲次二善道聲後三法輪聲上來總相通答於前果問竟自下第二大段辨得果之因答前問中一切菩薩所修行海等問也又釋亦是於前諸世界性中開一世界性顯內所有三種世間及五海等文中分四一舉往時處辨佛興世為修行緣二從彼炎光城下明普莊嚴童子能修行人三童子見佛下辨對緣正修成自分行四彼佛滅後下明復更見佛成勝進行初中四一舉往時二明往處三處中場四場上佛出第二往處中四一海中取性二性內山林三林東勝城於中初依報勝後人衆勝四眷屬城嚴第三場內初場地後華座第四佛興中初佛出後放光利益第二舉能修行人中王有順理善慧令物愛見問涅槃中一切輪王皆定千子不增不減何故此中乃不同耶答彼是王四天下之輪王約三乘説此是主世界性之輪王故寬細於彼如白淨寶網等以一恆沙金輪王福所感此約一乘説不同也又王及長子是福分童子為慧分是故成入道之器德周法界曰普普德交飾為嚴普之嚴普即嚴普嚴之童子普嚴即童子並通二釋離染貞潔素為道器故云童子如文殊等第三修成自分行中二初見佛得定為自分之始後聞經得定成自分之終前中有四一自利得定二偈勸化他三王喜偈告四俱共詣佛初中見佛功德善根因緣故者有三釋一由見佛功德善根之因緣力此則唯屬境力也二由見佛功德所生善根因緣力故得定三由外見佛功德為緣內自宿有善根為因因緣具故令得定也此十定中初五為成利他一具果法二入普巧三巧成嚴器四正益機五益分齊後五為成自利一成加行二入正證三廣後智四順涅槃五順菩提又初一總餘九別略釋可知二普勸中初説偈後偈聲分齊偈中初四歎佛德難遇次三明遇成勝益後一結勸興供三王喜偈告中二初王聞歡喜後偈敕告令於中三初一舉告宣告次七令嚴辨勝供後一令興念詣佛四俱共詣佛初王及內眷屬後八部外眷屬第二聞經得益中三初明説經名者謂行能現果舉果取因故云現等若從此義唯據因也又此佛集會即為顯現此則唯果此中三世是三現在故即具九世十世也不爾過未既無如何説現是一乘圓教故攝眷屬耳二童子獲益中二初得定自利益二説偈化他益初中四定一普該境法二攝入歸心三契法無畏四慧眼圓明二利他中二初説偈後得益偈中三初一總謂上半頌前法眼定下半總舉眼所見次七偈別辨佛本生由佛而得見後二別見諸佛而為物修因獲益可知三如來讚述九偈中分五初一總歎童子次二別記正報次二別記依果次二歎其苦行後二總記依正第四大段成勝進行中二初舉佛為行所依緣於中先佛滅後佛興者為行異緣別故也童子報命猶存者為行相續故也二依緣成行益於中二初見佛得四定為勝進之始一念佛者地論云如佛所得我亦當得為念佛也二入於普門窮茲海藏三智持為能轉智法輪正成所轉四深法悅神故也二聞經得定為勝進之終經名者謂法界自性清淨故云離垢具恆沙功德故曰莊嚴前經就果相此中約果體者為自分勝進漸深故也二定中初約自利後約利他又此中童子得法是何位者義準上下經意有三種成佛一約位以六相方便即十信終心勝進分後入十解初位即成佛以此是三乘終教不退之位故以一乘六相融攝即具諸位至佛果也是故此中童子見初佛為信位自分聞初經為信位勝進見後佛當解位初自分聞後經為解初勝進以攝諸位皆具足故二約行總不依位但自分勝進究竟即至佛果三約理則一切衆生並已成竟更不新成以餘相皆盡故性德本滿故此後應有結會謂彼童子者今某甲字等亦應有動地雨華他方來證及結通十方并偈重頌等但經來不盡故未有也問此會既了何不衆中有人得益答略由四意故無別益一於前三義中由初二義故説童子益相由後一義故衆中無別獲益二光統釋云此經佛初成道説但顯一乘圓教法輪體為諸教之本諸教益相為此益故不辨也三但教有二種一説逐機教攝法隨機機有增進隨分辨益二逐法教攝機同法法無增損故無別益四此經猶如日出先照高山既無中下之機故無隨分之益下文諸會並準此知釋第一會竟
